<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Gerenciamento de Padeiros - Brago Distribuidora">
  <title>Brago - Sistema Padeiro</title>
  
  <!-- Inter Font as Fallback for San Francisco -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Initialize Lucide icons after DOM content is loaded
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons({
        attrs: {
          'stroke-width': 1.75
        }
      });
    });
  </script>
  
  <!-- Chart.js for graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/styles.css?v=4.0">
  <link rel="stylesheet" href="/css/modal-move.css?v=3.0">
  <link rel="stylesheet" href="/css/padeiro-flow.css?v=1.1">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍞</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E4BFF">
  <!-- PWA iOS standalone support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brago Padeiro">
  <link rel="apple-touch-icon" href="/assets/icon-512.png">
</head>
<body>
  <div id="app"></div>
  <div class="toast-container" id="toast-container"></div>

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Real-time Tracking -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="/js/location-service.js?v=1.0"></script>
  <script src="/js/rastreamento.js?v=1.0"></script>

  <script src="/js/components.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/admin-dashboard.js?v=1.1"></script>
  <script src="/js/gestao.js?v=2.1"></script>
  <script src="/js/filiais.js?v=1.1"></script>
  <script src="/js/metas.js"></script>
  <script src="/js/avaliacoes.js"></script>
  <script src="/js/cronograma.js"></script>
  <script src="/js/modules/cronograma/cronograma.styles.js"></script>
  <script src="/js/modules/cronograma/cronograma.render.js"></script>
  <script src="/js/modules/cronograma/cronograma.drag.js"></script>
  <script src="/js/modules/cronograma/cronograma.tasks.js"></script>
  <script src="/js/modules/cronograma/cronograma.mensal.js"></script>
  <script src="/js/modules/cronograma/cronograma.smart.js"></script>
  <script src="/js/padeiro-flow.js"></script>
  <script src="/js/padeiro-agenda.js"></script>
  <script src="/js/padeiro-dashboard.js?v=1.1"></script>
  <script src="/js/dev.js"></script>
  <script src="/js/relatorios.js?v=1.3"></script>
  <script src="/js/app.js?v=2.1"></script>
  <script>
    // Service Worker Registration — Required for PWA standalone mode
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('✅ Service Worker registrado com sucesso. Scope:', reg.scope);
            // Check for updates periodically
            setInterval(() => reg.update(), 60 * 60 * 1000); // every hour
          })
          .catch((err) => {
            console.error('❌ Falha ao registrar Service Worker:', err);
          });
      });
    }
  </script>
</body>
</html>
