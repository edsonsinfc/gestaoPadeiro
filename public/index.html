    // Initialize Lucide icons after DOM content is loaded
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons({
        attrs: {
          'stroke-width': 1.75
        }
      });
    });
  </script>
  
  <!-- Chart.js for graphs -->

  <!-- Google Identity Services -->

  <!-- Signature Pad for client signatures -->

  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/styles.css?v=4.2">

  <!-- PWA iOS standalone support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brago Padeiro">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
</head>
<body>
  <div id="app"></div>
  <div class="toast-container" id="toast-container"></div>

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="/js/auth.js?v=1.5"></script>
  <script src="/js/admin-dashboard.js?v=1.1"></script>
  <script src="/js/gestao.js?v=2.1"></script>
  <script src="/js/filiais.js?v=1.1"></script>
  <script src="/js/metas.js"></script>
  <script src="/js/avaliacoes.js"></script>

  <script src="/js/modules/cronograma/cronograma.styles.js"></script>
  <script src="/js/modules/cronograma/cronograma.render.js"></script>
  <script src="/js/modules/cronograma/cronograma.drag.js"></script>
  <script src="/js/modules/cronograma/cronograma.tasks.js"></script>

  <script src="/js/app.js?v=2.6"></script>
  <script>
    // Service Worker Registration — Required for PWA standalone mode
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        console.log('🌐 Iniciando registro do Service Worker...');
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('✅ Service Worker registrado. Scope:', reg.scope);
            
            // Periodically check for updates
            setInterval(() => {
              console.log('🔍 Verificando atualizações do PWA...');
              reg.update();
            }, 60 * 60 * 1000);

            // Manual check for update on registration
            reg.update();

            reg.onupdatefound = () => {
              const installingWorker = reg.installing;
              console.log('📥 Nova versão do PWA sendo baixada...');
              
              installingWorker.onstatechange = () => {
                if (installingWorker.state === 'installed') {
                  if (navigator.serviceWorker.controller) {
                    console.log('✨ Atualização instalada com sucesso! Aplicando...');
                    if (window.Components && window.Components.toast) {
                      Components.toast('Nova versão disponível! Atualizando...', 'info');
                    }
                    // Small delay to let user see toast if possible
                    setTimeout(() => {
                      if (installingWorker) {
                        installingWorker.postMessage({ type: 'SKIP_WAITING' });
                      }
                    }, 1000);
                  }
                }
              };
            };
          })
          .catch((err) => {
            console.error('❌ Falha ao registrar Service Worker:', err);
          });
      });

      // Handle the reload when a new service worker takes over
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('🔄 Novo Service Worker ativo. Atualizando a página...');
        window.location.reload();
      });
    }
  </script>
</body>
</html>
